<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Download Hub</title>
  <link rel="icon" type="image/png" sizes="64x64" href="logo.png">

  <style>
    :root {
      --bg: #0f1115;
      --card: #161a22;
      --accent: #ff9f1c;
      --text: #f5f6fa;
      --muted: #b2b6c2;
      --button: #5865F2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      background: transparent;
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem;
      position: relative;
      overflow-x: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 2.5rem;
    }

    header {
      background: linear-gradient(145deg, #1b2030, var(--card));
      border-radius: 18px;
      padding: 2.5rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      position: relative;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 0.75rem;
    }

    .title img {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 0 14px rgba(88,255,120,0.6));
    }

    .subtitle {
      color: var(--muted);
      max-width: 650px;
      font-size: 1.05rem;
    }

    /* PROXY BUTTON */
    .proxy-btn{
      position:absolute;
      top:25px;
      right:30px;
      padding:10px 18px;
      border-radius:10px;
      background:var(--button);
      color:white;
      text-decoration:none;
      font-weight:700;
      box-shadow:0 10px 22px rgba(88,101,242,0.45);
      transition:transform .2s ease, box-shadow .2s ease;
    }

    .proxy-btn:hover{
      transform:scale(1.08);
      box-shadow:0 18px 40px rgba(88,101,242,0.65);
    }

    .downloads {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.75rem;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: scale(1.06);
      box-shadow: 0 28px 60px rgba(0,0,0,0.55);
    }

    .tag {
      display: inline-block;
      background: rgba(255,159,28,0.15);
      color: var(--accent);
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .card p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    .meta {
      font-size: 0.8rem;
      color: #9aa0b4;
      margin-bottom: 0.4rem;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--button);
      color: #fff;
      padding: 0.7rem 1.15rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(88,101,242,0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .download-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 18px 40px rgba(88,101,242,0.65);
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    #search {
      margin-top: 1.25rem;
      width: 100%;
      max-width: 420px;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: none;
      outline: none;
      background: var(--card);
      color: var(--text);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      font-size: 0.95rem;
    }

    #search::placeholder {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <main class="container">

    <header>
      <h1 class="title">
        <img src="logo.png" alt="Logo">
        Download Hub
      </h1>
      <p class="subtitle">Official downloads hosted directly from this site.</p>

      <input id="search" type="text" placeholder="Search downloads..." />

      <!-- PROXY BUTTON -->
      <a href="https://greengru3yt.github.io/m-nimum/" class="proxy-btn">
        Go To Proxy
      </a>

    </header>

    <!-- ALL YOUR DOWNLOAD CARDS REMAIN EXACTLY THE SAME -->
